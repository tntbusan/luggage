<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>접근 확인</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      font-family: sans-serif;
      background-color: #f0f4ff;
      text-align: center;
      padding: 100px 20px;
    }

    .container {
      background: white;
      padding: 40px;
      border-radius: 16px;
      max-width: 400px;
      margin: auto;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
    }

    h2 {
      margin-bottom: 20px;
      color: #333;
    }

    .password-wrapper {
      position: relative;
      display: inline-block;
      width: 80%;
    }

    input[type="password"],
    input[type="text"] {
      padding: 12px 40px 12px 12px;
      width: 100%;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 8px;
      margin-bottom: 20px;
      box-sizing: border-box;
      height: 48px;
    }

    .toggle-visibility {
      position: absolute;
      right: 12px;
      top: 13px;
      font-size: 20px;
      cursor: pointer;
      user-select: none;
      height: 24px;
      width: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    button {
      background-color: #4F9FFF;
      color: white;
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
    }

    button:hover {
      background-color: #2e7be4;
    }

    .error {
      color: red;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>비밀번호를 입력하세요</h2>
    <div class="password-wrapper">
      <input type="password" id="passwordInput" placeholder="비밀번호 입력" />
      <span class="toggle-visibility" onclick="togglePassword()">👁️</span>
    </div>
    <br />
    <button onclick="checkPassword()">확인</button>
    <div id="errorMessage" class="error"></div>
    <div>전달해드린 비밀번호는 <br>
         부산출발 1일전, 15시부터 적용됩니다.</div>
  </div>

  <script>
    const correctPassword = "8956";

    function checkPassword() {
      const input = document.getElementById("passwordInput").value.trim();
      const error = document.getElementById("errorMessage");

      if (input === correctPassword) {
        window.location.href = "luggage.html";
      } else {
        error.textContent = "비밀번호가 틀렸습니다.";
      }
    }

    function togglePassword() {
      const input = document.getElementById("passwordInput");
      const icon = document.querySelector(".toggle-visibility");
      if (input.type === "password") {
        input.type = "text";
        icon.textContent = "🙈";
      } else {
        input.type = "password";
        icon.textContent = "👁️";
      }
    }

    document.getElementById("passwordInput").addEventListener("keyup", function (event) {
      if (event.key === "Enter") {
        checkPassword();
      }
    });
  </script>
</body>
</html>
